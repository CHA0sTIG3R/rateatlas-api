spring.application.name=rateatlas-api

# JPA schema management: create-drop, validate, update
#spring.config.activate.on-profile=prod
spring.jpa.hibernate.ddl-auto=validate

# Ingestion API key (required for /api/v1/tax/upload). Leave empty to disable uploads.
app.ingest.api-key=${APP_INGEST_API_KEY:}

tax.s3-bucket=${TAX_S3_BUCKET}
tax.s3-key=${TAX_S3_KEY}

# Database connection (PostgreSQL example)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# Flyway migration configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=flyway_schema
spring.flyway.default-schema=flyway_schema
spring.flyway.init-sqls=CREATE SCHEMA IF NOT EXISTS ${SPRING_FLYWAY_DEFAULT_SCHEMA:${APP_DB_SCHEMA:flyway_schema}}

# Add request correlation id (rid) to log lines
logging.pattern.level=%5p rid=%X{rid}

# Ensure JPA uses the same schema as Flyway by default 
spring.jpa.properties.hibernate.default_schema=${APP_DB_SCHEMA:${SPRING_FLYWAY_DEFAULT_SCHEMA:flyway_schema}}

# Enable Prometheus metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=unrestricted

# Prometheus scrape configuration
prometheus.scrape.username=${PROMETHEUS_SCRAPE_USERNAME}
prometheus.scrape.password=${PROMETHEUS_SCRAPE_PASSWORD}

# Enable percentiles histogram for http.server.requests
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# OpenTelemetry
otel.service.name=rateatlas-api
otel.resource.attributes=deployment.environment=production
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}
otel.exporter.otlp.headers=${OTEL_EXPORTER_OTLP_HEADERS}
otel.traces.exporter=otlp
otel.metrics.exporter=none
otel.logs.exporter=none

# Redis
spring.data.redis.url=${REDIS_URL}
spring.data.redis.connect-timeout=2000
spring.data.redis.timeout=1000

# Circuit Breakers
# Expose circuit breaker state via actuator health
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always

# Redis - fast cache calls; open quickly and recover quickly
resilience4j.circuitbreaker.instances.redis.register-health-indicator=true
resilience4j.circuitbreaker.instances.redis.sliding-window-size=10
resilience4j.circuitbreaker.instances.redis.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.redis.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redis.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.redis.slow-call-duration-threshold=500ms
resilience4j.circuitbreaker.instances.redis.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.redis.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.redis.automatic-transition-from-open-to-half-open-enabled=true

# Database - heavier calls; allow more time before considering a call slow
# IllegalArgumentException is a user input error, not a DB failure, don't count it
resilience4j.circuitbreaker.instances.database.ignore-exceptions=java.lang.IllegalArgumentException
resilience4j.circuitbreaker.instances.database.register-health-indicator=true
resilience4j.circuitbreaker.instances.database.sliding-window-size=10
resilience4j.circuitbreaker.instances.database.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.database.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.database.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.database.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.instances.database.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.database.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.database.automatic-transition-from-open-to-half-open-enabled=true

# S3 - infrequent, high-latency network I/O; smaller window, longer slow-call threshold
resilience4j.circuitbreaker.instances.s3.register-health-indicator=true
resilience4j.circuitbreaker.instances.s3.sliding-window-size=5
resilience4j.circuitbreaker.instances.s3.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.s3.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.s3.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.s3.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.s3.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.s3.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.s3.automatic-transition-from-open-to-half-open-enabled=true
